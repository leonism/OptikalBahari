<!-- Algolia Search Overlay Modal -->
<div
  id='algolia-search-overlay'
  class='algolia-search-overlay'
  role='dialog'
  aria-modal='true'
  aria-labelledby='search-title'
  aria-hidden='true'
>
  <div class='algolia-search-container'>
    <!-- Header -->
    <div class='algolia-search-header'>
      <div class='search-input-wrapper'>
        {% include icons/icon-search.html class="search-input-icon" %}
        <input
          type='search'
          id='algolia-search-input'
          class='algolia-search-input'
          placeholder='Cari artikel, produk, dan informasi lainnya...'
          aria-label='Search'
          autocomplete='on'
          spellcheck='false'
          autocapitalize='none'
          autocorrect='on'
        >
        <button
          id='algolia-clear-input'
          class='search-clear-btn'
          aria-label='Clear search'
          type='button'
          style='display: none;'
        >
          {% include icons/icon-times.html class="icon-inline" %}
        </button>
      </div>
      <button
        id='algolia-close-search'
        class='search-close-btn'
        aria-label='Close search'
        type='button'
      >
        {% include icons/icon-times.html class="icon-inline" %}
      </button>
    </div>

    <!-- Controls (Filters Toggle) -->
    <div class='algolia-search-controls'>
      <button id='algolia-filter-toggle' class='filter-toggle-btn' type='button'>
        {% include icons/icon-filter.html class="icon-inline" %}
        <span>Filter & Sort</span>
        {% include icons/icon-chevron-down.html class="icon-inline ms-1" %}
      </button>

      <div id='algolia-filters-container' class='search-filters-container'>
        <div class='search-filters'>
          <div id='algolia-categories-filter' class='filter-group'></div>
          <div id='algolia-tags-filter' class='filter-group'></div>
          <div class='filter-group'>
            <h4 class='facet-header'>Urutkan</h4>
            <div id='algolia-sort-select'></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Results Container -->
    <div class='algolia-search-body'>
      <!-- Stats -->
      <div id='algolia-stats' class='search-stats'></div>

      <!-- Hits (Results) -->
      <div id='algolia-hits' class='search-results'></div>

      <!-- Pagination -->
      <div id='algolia-pagination' class='search-pagination'></div>
    </div>

    <!-- Footer -->
    <div class='algolia-search-footer'>
      <div class='keyboard-shortcuts'>
        <span class='me-3'>
          <kbd>↑</kbd>
          <kbd>↓</kbd>
          Navigate
        </span>
        <span class='me-3'>
          <kbd>Enter</kbd>
          Select
        </span>
        <span>
          <kbd>ESC</kbd>
          Close
        </span>
      </div>
      <a href='https://www.algolia.com/?utm_source=jekyll&utm_medium=website&utm_content=optikalbahari' class='powered-by' target='_blank' rel='noopener noreferrer' aria-label='Search powered by Algolia'>
        <span>Search by</span>
        <strong class='algolia-logo-text'>Algolia</strong>
      </a>
    </div>
  </div>
</div>

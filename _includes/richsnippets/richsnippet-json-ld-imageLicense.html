<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ site.url }} {{ page.url }}"
    },
    "headline": {{ page.title | jsonify }},
    "author": {
      "@type": "Organization",
      "name": {{ site.author_name | jsonify }}
    },
    "publisher": {
      "@type": "Organization",
      "name": {{ site.author_name | jsonify }},
      "logo": {
        "@type": "ImageObject",
        "url": "{{ 'assets/apple-icon-180x180.png' | cloudinary_url: 'q_auto,f_png' | replace: 'https://res.cloudinary.com/divkqrf7k', 'https://assets.optikalbahari.com' }}",
        "width": 180,
        "height": 180
      }
    },
    "image": [{%- assign first_image = true -%}{%- for file in site.static_files -%}
        {%- comment -%}
          1. Filter : Look only inside the posts folder {%- endcomment -%}
        {%- if file.path contains 'assets/img/posts/' -%}

          {%- comment -%}
            2. Filter : Ensure we only grab valid image extensions {%- endcomment -%}
          {%- assign ext = file.extname | downcase -%}
          {%- if ext == '.jpg' or ext == '.jpeg' or ext == '.png' or ext == '.webp' -%}

            {%- comment -%}
              3. JSON Comma Logic : Add comma before every item EXCEPT the first one {%- endcomment -%}
            {%- unless first_image -%},{%- endunless -%}{%- comment -%}4. Output : Strip leading slash, optimize, and apply custom domain {%- endcomment -%}
          "{{ file.path | replace_first: '/', '' | cloudinary_url: 'q_auto,f_auto' | replace: 'https://res.cloudinary.com/divkqrf7k', 'https://assets.optikalbahari.com' }}"{%- assign first_image = false -%}
          {%- endif -%}
          {%- endif -%}
          {%- endfor -%}]
      }
</script>

<!-- start the Cicilan -->
<div class='card shadow p-0  hover-zoomin'>
  <a
    href='{{ '/kacamata-cicilan/' | relative_url }}'
    role='button'
    title='Program Kacamata Cicilan Tanpa Bunga'
  >
    <img
      itemprop='image'
      src='{{ '/assets/img/bg-index-arch-1.jpg' | relative_url }}'
      class='card-img-top img-fluid'
      loading='lazy'
      alt='Ada Program Cicilan'
    >
  </a>
  <div class='card-body'>
    <h3 class='card-title align-middle'>
      {% include icons/icon-circle-check.html class="icon-inline text-green" %}
      Kacamata Cicilan 0%
    </h3>
    <p class='card-text text-start'>Beli Kacamata Nyicil, Bayar Bulanan, Tanpa DP, Tanpa Credit Card dan Tanpa Bunga</p>
    <p class='card-text text-start'>
      <a
        class='btn btn-primary rounded-pill text-white'
        href='{{ '/kacamata-cicilan/' | relative_url }}'
        role='button'
        title='Program Kacamata Cicilan Tanpa Bunga'
      >
        {% include icons/icon-circle-arrow-right.html class="icon-inline text-white" %}
        Lebih Lanjut
      </a>
    </p>
  </div>
</div>
<!-- end the Cicilan -->
